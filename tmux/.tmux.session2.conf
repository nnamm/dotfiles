# Session name
rename-session Main

# Panel division
splitw -h -d
splitw -v -d -t 2
splitw -h -d -t 2
resize-pane -t 2 -D 12

# Window name
rename-window -t 1 Dev

# Display initialize
send-key -t 1 clear c-m
send-key -t 2 clear c-m
send-key -t 3 clear c-m
send-key -t 4 clear c-m
send-key -t 1 "nvim" c-m
send-key -t 2 "claude" c-m
send-key -t 3 "codex" c-m
select-pane -t 1
